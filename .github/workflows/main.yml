name: Build&Test

permissions:
  contents: read

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - '**/*.properties'
      - '**/*.md'
      - 'samples'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Java
        uses: ./.github/actions/setup-java
      - name: Build&Test
        run: ./gradlew build
