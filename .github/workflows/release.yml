name: Release

on: workflow_dispatch

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Java
        uses: ./.github/actions/setup-java
      - name: Setup git
        uses: ./.github/actions/setup-git
      - name: Release
        run: ./gradlew release -Prelease.useAutomaticVersion=true
